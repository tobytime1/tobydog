<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命时长计算器 | 精准计算你的人生时光</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // 配置Tailwind自定义主题
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        accent: '#10b981',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1), 0 8px 10px -6px rgba(59, 130, 246, 0.1);
            }
            .input-focus {
                @apply focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none;
            }
            .btn-hover {
                @apply hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-light to-slate-100 min-h-screen font-inter text-dark">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- 头部标题 -->
        <header class="text-center mb-8">
            <h1 class="text-[clamp(1.8rem,4vw,2.5rem)] font-bold text-primary mb-2">生命时长计算器</h1>
            <p class="text-secondary">精准计算你来到这个世界的每一秒</p>
        </header>

        <!-- 主卡片 -->
        <div class="bg-white rounded-2xl p-6 md:p-8 card-shadow mb-8">
            <!-- 输入模式切换 -->
            <div class="flex mb-6 border-b border-slate-200">
                <button id="dateModeBtn" class="px-4 py-2 font-medium text-primary border-b-2 border-primary">
                    <i class="fa fa-calendar mr-2"></i>日期选择
                </button>
                <button id="timestampModeBtn" class="px-4 py-2 font-medium text-secondary hover:text-primary transition-colors">
                    <i class="fa fa-clock-o mr-2"></i>时间戳(秒)
                </button>
            </div>

            <!-- 日期选择模式 -->
            <div id="dateInputSection" class="mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">出生日期</label>
                        <input type="date" id="birthDate" class="w-full px-4 py-3 rounded-lg border border-slate-300 input-focus">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">出生时间</label>
                        <input type="time" id="birthTime" class="w-full px-4 py-3 rounded-lg border border-slate-300 input-focus">
                    </div>
                </div>
                <div class="text-xs text-slate-500 mb-2">
                    <i class="fa fa-info-circle mr-1"></i>提示：精确到分即可，秒数会自动补0
                </div>
            </div>

            <!-- 时间戳输入模式 (默认隐藏) -->
            <div id="timestampInputSection" class="mb-6 hidden">
                <label class="block text-sm font-medium text-slate-700 mb-1">出生日期时间戳(秒)</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><i class="fa fa-hashtag"></i></span>
                    <input type="number" id="birthTimestamp" placeholder="例如：631152000 (对应1990-01-01 00:00:00)" 
                           class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 input-focus">
                </div>
                <div class="text-xs text-slate-500 mt-2">
                    <i class="fa fa-info-circle mr-1"></i>Unix时间戳：从1970-01-01 00:00:00 UTC开始计算的秒数
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="flex gap-4 mb-6">
                <button id="calculateBtn" class="flex-1 bg-primary text-white px-6 py-3 rounded-lg font-medium btn-hover">
                    <i class="fa fa-calculator mr-2"></i>开始计算
                </button>
                <button id="resetBtn" class="px-6 py-3 rounded-lg font-medium border border-slate-300 text-slate-700 hover:bg-slate-50 btn-hover">
                    <i class="fa fa-refresh mr-2"></i>重置
                </button>
            </div>

            <!-- 结果展示区 (默认隐藏) -->
            <div id="resultSection" class="hidden pt-6 border-t border-slate-200">
                <h3 class="text-lg font-semibold mb-4 flex items-center">
                    <i class="fa fa-heartbeat text-accent mr-2"></i>你的生命时长
                </h3>
                
                <!-- 总时长概览 -->
                <div class="bg-slate-50 rounded-xl p-4 mb-6">
                    <p class="text-sm text-slate-600 mb-1">总计</p>
                    <p id="totalDuration" class="text-xl font-bold text-primary">0年 0月 0天 0时 0分 0秒</p>
                </div>

                <!-- 详细时间维度 -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-4">
                    <div class="bg-slate-50 rounded-xl p-4 text-center">
                        <p id="years" class="text-2xl font-bold text-accent">0</p>
                        <p class="text-sm text-slate-600">年</p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4 text-center">
                        <p id="months" class="text-2xl font-bold text-accent">0</p>
                        <p class="text-sm text-slate-600">月</p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4 text-center">
                        <p id="days" class="text-2xl font-bold text-accent">0</p>
                        <p class="text-sm text-slate-600">天</p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4 text-center">
                        <p id="hours" class="text-2xl font-bold text-accent">0</p>
                        <p class="text-sm text-slate-600">时</p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4 text-center">
                        <p id="minutes" class="text-2xl font-bold text-accent">0</p>
                        <p class="text-sm text-slate-600">分</p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4 text-center">
                        <p id="seconds" class="text-2xl font-bold text-accent">0</p>
                        <p class="text-sm text-slate-600">秒</p>
                    </div>
                </div>

                <!-- 额外统计 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-50 rounded-xl p-4">
                        <p class="text-sm text-slate-600 mb-1">总天数</p>
                        <p id="totalDays" class="text-lg font-semibold text-primary">0 天</p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4">
                        <p class="text-sm text-slate-600 mb-1">总秒数</p>
                        <p id="totalSeconds" class="text-lg font-semibold text-primary">0 秒</p>
                    </div>
                </div>

                <!-- 实时更新提示 -->
                <div class="mt-4 text-xs text-slate-500 flex items-center">
                    <i class="fa fa-bolt text-yellow-500 mr-1"></i>
                    <span>秒数正在实时更新中...</span>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <footer class="text-center text-sm text-slate-500">
            <p>© 2026 生命时长计算器 | 精准计算每一刻时光</p>
        </footer>
    </div>

    <script>
        // DOM元素
        const dateModeBtn = document.getElementById('dateModeBtn');
        const timestampModeBtn = document.getElementById('timestampModeBtn');
        const dateInputSection = document.getElementById('dateInputSection');
        const timestampInputSection = document.getElementById('timestampInputSection');
        const birthDate = document.getElementById('birthDate');
        const birthTime = document.getElementById('birthTime');
        const birthTimestamp = document.getElementById('birthTimestamp');
        const calculateBtn = document.getElementById('calculateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultSection = document.getElementById('resultSection');
        
        // 结果展示元素
        const yearsEl = document.getElementById('years');
        const monthsEl = document.getElementById('months');
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const totalDurationEl = document.getElementById('totalDuration');
        const totalDaysEl = document.getElementById('totalDays');
        const totalSecondsEl = document.getElementById('totalSeconds');

        // 定时器变量
        let updateTimer = null;

        // 初始化日期为18年前（示例）
        const initDate = new Date();
        initDate.setFullYear(initDate.getFullYear() - 18);
        const formattedDate = initDate.toISOString().split('T')[0];
        const formattedTime = initDate.toTimeString().split(' ')[0].slice(0, 5);
        birthDate.value = formattedDate;
        birthTime.value = formattedTime;

        // 模式切换
        dateModeBtn.addEventListener('click', () => {
            dateModeBtn.classList.add('text-primary', 'border-b-2', 'border-primary');
            dateModeBtn.classList.remove('text-secondary');
            timestampModeBtn.classList.remove('text-primary', 'border-b-2', 'border-primary');
            timestampModeBtn.classList.add('text-secondary');
            dateInputSection.classList.remove('hidden');
            timestampInputSection.classList.add('hidden');
        });

        timestampModeBtn.addEventListener('click', () => {
            timestampModeBtn.classList.add('text-primary', 'border-b-2', 'border-primary');
            timestampModeBtn.classList.remove('text-secondary');
            dateModeBtn.classList.remove('text-primary', 'border-b-2', 'border-primary');
            dateModeBtn.classList.add('text-secondary');
            dateInputSection.classList.add('hidden');
            timestampInputSection.classList.remove('hidden');
        });

        // 计算生命时长核心函数
        function calculateLifeDuration(birthTs) {
            // 验证时间戳有效性
            if (isNaN(birthTs) || birthTs < 0 || birthTs > Date.now() / 1000) {
                alert('请输入有效的出生日期/时间戳！');
                return null;
            }

            const now = Date.now() / 1000; // 当前时间戳（秒）
            const totalSeconds = Math.floor(now - birthTs);
            
            // 时间单位换算（采用更精准的计算方式）
            const secondsPerMinute = 60;
            const secondsPerHour = 3600;
            const secondsPerDay = 86400;
            const secondsPerYear = 31557600; // 365.25天
            const secondsPerMonth = 2629800; // 30.44天

            // 计算总天数和总秒数
            const totalDays = Math.floor(totalSeconds / secondsPerDay);
            
            // 计算年、月、日、时、分、秒
            const years = Math.floor(totalSeconds / secondsPerYear);
            const remainingAfterYears = totalSeconds % secondsPerYear;
            
            const months = Math.floor(remainingAfterYears / secondsPerMonth);
            const remainingAfterMonths = remainingAfterYears % secondsPerMonth;
            
            const days = Math.floor(remainingAfterMonths / secondsPerDay);
            const remainingAfterDays = remainingAfterMonths % secondsPerDay;
            
            const hours = Math.floor(remainingAfterDays / secondsPerHour);
            const remainingAfterHours = remainingAfterDays % secondsPerHour;
            
            const minutes = Math.floor(remainingAfterHours / secondsPerMinute);
            const seconds = Math.floor(remainingAfterHours % secondsPerMinute);

            return {
                years, months, days, hours, minutes, seconds,
                totalSeconds, totalDays,
                totalDuration: `${years}年 ${months}月 ${days}天 ${hours}时 ${minutes}分 ${seconds}秒`
            };
        }

        // 更新结果显示
        function updateResult(duration) {
            if (!duration) return;
            
            // 更新各维度数值
            yearsEl.textContent = duration.years;
            monthsEl.textContent = duration.months;
            daysEl.textContent = duration.days;
            hoursEl.textContent = duration.hours;
            minutesEl.textContent = duration.minutes;
            secondsEl.textContent = duration.seconds;
            
            // 更新总计信息
            totalDurationEl.textContent = duration.totalDuration;
            totalDaysEl.textContent = `${duration.totalDays.toLocaleString()} 天`;
            totalSecondsEl.textContent = `${duration.totalSeconds.toLocaleString()} 秒`;
            
            // 显示结果区域
            resultSection.classList.remove('hidden');
        }

        // 实时更新函数
        function startRealTimeUpdate(birthTs) {
            // 清除之前的定时器
            if (updateTimer) clearInterval(updateTimer);
            
            // 每秒更新一次
            updateTimer = setInterval(() => {
                const duration = calculateLifeDuration(birthTs);
                if (duration) {
                    secondsEl.textContent = duration.seconds;
                    totalSecondsEl.textContent = `${duration.totalSeconds.toLocaleString()} 秒`;
                    totalDurationEl.textContent = duration.totalDuration;
                    
                    // 处理进位逻辑
                    if (duration.seconds === 0) {
                        minutesEl.textContent = duration.minutes;
                        if (duration.minutes === 0) {
                            hoursEl.textContent = duration.hours;
                            if (duration.hours === 0) {
                                daysEl.textContent = duration.days;
                                totalDaysEl.textContent = `${duration.totalDays.toLocaleString()} 天`;
                                if (duration.days === 0) {
                                    monthsEl.textContent = duration.months;
                                    if (duration.months === 0) {
                                        yearsEl.textContent = duration.years;
                                    }
                                }
                            }
                        }
                    }
                }
            }, 1000);
        }

        // 计算按钮点击事件
        calculateBtn.addEventListener('click', () => {
            let birthTs;
            
            // 判断当前输入模式
            if (dateInputSection.classList.contains('hidden')) {
                // 时间戳模式
                birthTs = parseFloat(birthTimestamp.value);
            } else {
                // 日期模式：转换为时间戳（秒）
                const dateStr = birthDate.value;
                const timeStr = birthTime.value || '00:00';
                
                if (!dateStr) {
                    alert('请选择出生日期！');
                    return;
                }
                
                const fullDateTime = `${dateStr}T${timeStr}:00`;
                birthTs = new Date(fullDateTime).getTime() / 1000;
            }
            
            // 计算并更新结果
            const duration = calculateLifeDuration(birthTs);
            if (duration) {
                updateResult(duration);
                startRealTimeUpdate(birthTs);
            }
        });

        // 重置按钮点击事件
        resetBtn.addEventListener('click', () => {
            // 重置输入
            birthDate.value = formattedDate;
            birthTime.value = formattedTime;
            birthTimestamp.value = '';
            
            // 隐藏结果
            resultSection.classList.add('hidden');
            
            // 清除定时器
            if (updateTimer) {
                clearInterval(updateTimer);
                updateTimer = null;
            }
            
            // 切换回日期模式
            dateModeBtn.click();
        });

        // 页面加载完成后自动计算一次示例数据
        window.addEventListener('load', () => {
            const demoTs = new Date(`${formattedDate}T${formattedTime}:00`).getTime() / 1000;
            const duration = calculateLifeDuration(demoTs);
            if (duration) {
                updateResult(duration);
                startRealTimeUpdate(demoTs);
            }
        });
    </script>
</body>
</html>
